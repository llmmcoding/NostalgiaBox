<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌲 魔塔·暗黑森林 - 时光机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif;color:#c9d1d9}
h2{color:#f0f6fc;font-size:14px;margin:6px 0;text-align:center;letter-spacing:1px}
#c{background:#161b22;border:1px solid #30363d;border-radius:6px;image-rendering:pixelated;max-width:100%;display:block}
.info{display:flex;gap:6px;margin:6px 0;width:100%;max-width:500px;padding:0 4px;flex-wrap:wrap}
.box{flex:1;background:#161b22;border:1px solid #30363d;border-radius:5px;padding:4px 6px;font-size:11px;min-width:60px;position:relative;overflow:hidden}
.box .l{color:#8b949e;font-size:9px;margin-bottom:2px}
.box .v{color:#f0f6fc;font-size:13px;font-weight:700;position:relative;z-index:2}
.box .hp-bar-bg{position:absolute;bottom:0;left:0;height:3px;background:#21262d;width:100%;z-index:1}
.box .hp-bar-fill{position:absolute;bottom:0;left:0;height:3px;background:#3fb950;width:100%;z-index:2;transition:width 0s}
.box .hp-bar-fill.low{background:#f85149}
.box .hp-bar-fill.mid{background:#d29922}
.log{min-height:20px;font-size:11px;color:#8b949e;text-align:center;margin:4px 0;padding:0 8px}
.btn-row{display:flex;gap:6px;margin-top:4px}
button{padding:5px 12px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:5px;font-size:11px;cursor:pointer}
button:active{background:#30363d}
#menu{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
#menu h1{color:#f0f6fc;font-size:24px;margin-bottom:6px}
#menu p{color:#8b949e;font-size:12px;margin:4px 0;text-align:center;max-width:280px;line-height:1.6}
#menu .start{margin-top:14px;padding:10px 32px;background:#da3633;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer}
#win{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
#win h1{color:#f0f6fc;font-size:26px;margin-bottom:10px}
#win p{color:#8b949e;font-size:13px}
.dpad{position:fixed;bottom:16px;left:16px;display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:2px}
.db{background:rgba(255,255,255,.12);border:none;border-radius:8px;color:#fff;font-size:18px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
.db:active{background:rgba(255,255,255,.25)}
#freezeMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(30,60,120,.9);color:#88ccff;border:2px solid #4488cc;border-radius:10px;padding:10px 24px;font-size:14px;z-index:5;display:none;pointer-events:none;text-align:center;min-width:140px}
#freezeMsg span{font-size:18px;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<h2>🌲 魔塔·暗黑森林</h2>
<div class="info">
  <div class="box"><div class="l">楼层</div><div class="v" id="floorNum">第1层</div></div>
  <div class="box"><div class="l">HP</div><div class="v" id="hpText">1000/1000</div><div class="hp-bar-bg"><div class="hp-bar-fill" id="hpBarFill"></div></div></div>
  <div class="box"><div class="l">攻击</div><div class="v" id="atkText">10</div></div>
  <div class="box"><div class="l">防御</div><div class="v" id="defText">5</div></div>
  <div class="box"><div class="l">金币</div><div class="v" id="goldText">0</div></div>
  <div class="box"><div class="l">🔑钥匙</div><div class="v" id="keyText">3</div></div>
</div>
<canvas id="c" width="480" height="360"></canvas>
<div class="log" id="log">方向键/WASD移动，碰怪自动战斗</div>
<div class="btn-row">
  <button onclick="S.save()">💾 存档</button>
  <button onclick="S.load()">📂 读档</button>
  <button onclick="S.reset()">🔄 重置</button>
</div>
<div id="menu">
  <h1>🌲 暗黑森林</h1>
  <p>比黄金大陆更危险的魔塔<br>怪物更强，资源更稀缺<br>小心debuff陷阱！<br>到达第20层即通关</p>
  <button class="start" onclick="S.start()">进入魔塔</button>
</div>
<div id="win">
  <h1>🏆 通关！</h1>
  <p>你穿越了暗黑森林，拯救了公主！</p>
</div>
<div id="freezeMsg"><span>❄️</span><span id="freezeMsgText">冻结中</span></div>
<div class="dpad">
  <div></div><button class="db" id="btnUp">▲</div><div></div>
  <button class="db" id="btnLeft">◀</div><div></div><button class="db" id="btnRight">▶</div>
  <div></div><button class="db" id="btnDown">▼</div><div></div>
</div>

<script>
// ============================================================
// PARTICLE & ANIMATION SYSTEM
// ============================================================
const P={list:[],
  add(p){this.list.push({...p,life:p.life||60,age:0,_ox:p.x,_oy:p.y,_os:p.scale||1,_or:p.r||0,_r:p.r||0,_osc:p.osc||0,_osc2:p.osc2||0,_lx:p.lx||0,_ly:p.ly||0});},
  update(){for(let i=this.list.length-1;i>=0;i--){const p=this.list[i];p.age++;const t=p.age/p.life;p.opacity=1-t;p.x+=p.vx||0;p.y+=p.vy||0;if(p.osc!==undefined&&p.osc!==0){p.vx=p._osc*Math.sin(p.age*0.15+p._osc2);}if(p.ly)p.vy+=p.ly;if(p.lx)p.vx+=p.lx;p.scale=p._os*(1-t*0.3);p.r=p._r+p.age*(p._dr||0);if(p.age>=p.life)this.list.splice(i,1);}},
  draw(ctx){this.list.forEach(p=>{if(p.opacity<=0)return;ctx.save();ctx.globalAlpha=p.opacity;ctx.translate(p.x,p.y);ctx.rotate(p.r||0);ctx.scale(p.scale||1,p.scale||1);if(p.type==='rect'){ctx.fillStyle=p.color||'#fff';ctx.fillRect(-(p.w||4)/2,-(p.h||4)/2,p.w||4,p.h||4);}else if(p.type==='circle'){ctx.beginPath();ctx.arc(0,0,p.r||4,0,Math.PI*2);ctx.fillStyle=p.color||'#fff';ctx.fill();}else if(p.type==='text'){ctx.font=`bold ${p.fs||14}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=p.color||'#fff';ctx.fillText(p.text,0,0);}else{ctx.font=`${p.fs||16}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.text,0,0);}ctx.restore();});},
  clear(){this.list=[];}
};

// Floating damage numbers
const DmgNumbers={list:[],
  add(x,y,text,color){this.list.push({x,y,vx:0,vy:-1.2,text,color,life:50,age:0,scale:1.3,_sc:1.3});},
  update(){for(let i=this.list.length-1;i>=0;i--){const d=this.list[i];d.age++;d.y+=d.vy;const t=d.age/d.life;if(t>0.3)d.scale=d._sc*(1-((t-0.3)/0.7)*0.5);if(d.age>=d.life)this.list.splice(i,1);}},
  draw(ctx){this.list.forEach(d=>{const t=d.age/d.life;const alpha=1-t;ctx.save();ctx.globalAlpha=alpha;ctx.translate(d.x,d.y);ctx.scale(d.scale,d.scale);ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#000';ctx.fillText(d.text,1,1);ctx.fillStyle=d.color;ctx.fillText(d.text,0,0);ctx.restore();});},
  clear(){this.list=[];}
};

// Screen shake
const Shake={active:false,dur:0,age:0,intensity:6,
  start(dur,intensity){this.active=true;this.dur=dur;this.age=0;this.intensity=intensity||6;},
  update(){if(!this.active)return null;this.age++;if(this.age>=this.dur){this.active=false;return {x:0,y:0};}const decay=1-this.age/this.dur;return{x:(Math.random()-0.5)*2*this.intensity*decay,y:(Math.random()-0.5)*2*this.intensity*decay};},
  reset(){this.active=false;}
};

// HP bar smooth animation
const HPAnim={displayed:1000,target:1000,lerping:false,startTime:0,startVal:0,duration:300,
  set(val){this.target=Math.max(0,val);if(!this.lerping){this.startVal=this.displayed;this.startTime=performance.now();this.lerping=true;}},
  update(){if(!this.lerping)return;const elapsed=performance.now()-this.startTime;const t=Math.min(1,elapsed/this.duration);const ease=1-Math.pow(1-t,3);this.displayed=this.startVal+(this.target-this.startVal)*ease;if(t>=1)this.lerping=false;},
  getVal(){return Math.round(this.displayed);}
};

// Floor counter animation
const FloorAnim={scale:1,time:0,
  trigger(){this.scale=1.3;this.time=0;},
  update(){if(this.scale<=1&&this.time===0)return;this.time++;const t=Math.min(1,this.time/25);const bounce=Math.sin(t*Math.PI);this.scale=1+0.3*bounce*(1-t);if(t>=1){this.scale=1;this.time=0;}}
};

// Overlay system
const Overlay={active:false,type:'',alpha:0,life:0,age:0,
  show(type,msg,sub){
    this.active=true;this.type=type;this.alpha=1;this.age=0;this.life=120;
    this._msg=msg;this._sub=sub;
    P.clear();
  },
  update(){if(!this.active)return;this.age++;const fadeIn=Math.min(1,this.age/20);const fadeOut=this.age>this.life-40?(this.life-this.age)/40:1;this.alpha=fadeIn*fadeOut;if(this.age>=this.life){this.active=false;this.alpha=0;}},
  draw(ctx){if(!this.active)return;
    if(this.type==='black'){ctx.fillStyle=`rgba(0,0,0,${this.alpha})`;ctx.fillRect(0,0,480,360);}
    else if(this.type==='defeat'){ctx.fillStyle=`rgba(120,10,10,${this.alpha*0.6})`;ctx.fillRect(0,0,480,360);if(this.age>15){ctx.save();ctx.globalAlpha=this.alpha*(this.age>30?Math.max(0,(this.life-this.age)/60):1);ctx.font='bold 32px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#ff4444';ctx.fillText('你倒下了',240,170);ctx.font='14px sans-serif';ctx.fillStyle='#cc8888';ctx.fillText('💀 第'+S.floor+'层',240,210);ctx.restore();}}
    else if(this.type==='victory'){
      ctx.fillStyle=`rgba(0,0,0,${this.alpha*0.7})`;ctx.fillRect(0,0,480,360);
      if(this.age>15){ctx.save();ctx.globalAlpha=this.alpha;ctx.font='bold 36px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#ffd700';ctx.shadowColor='#ff8800';ctx.shadowBlur=20;ctx.fillText('通关!',240,160);ctx.font='14px sans-serif';ctx.shadowBlur=0;ctx.fillStyle='#c0a060';ctx.fillText('🏆 暗黑森林已被穿越',240,200);ctx.restore();}
    }
  }
};

// Monster HP bar animation
function initMonsterHP(m){m._dispHp=m.hp;m._flash=0;}
function hurtMonster(m,dmg){m._flash=10;m.hp-=dmg;if(m.hp<0)m.hp=0;}

// Player flash
const PlayerFlash={active:false,time:0,dur:12,color:'#ff6600',
  trigger(color,dur){this.active=true;this.time=0;this.color=color||'#ff6600';this.dur=dur||12;},
  update(){if(this.active){this.time++;if(this.time>=this.dur)this.active=false;}},
  getColor(){if(!this.active)return null;return this.color+(this.time<this.dur/2?'88':'44');}
};

// Door unlock animation
const DoorAnim={list:[],
  trigger(tx,ty){this.list.push({tx,ty,age:0,life:25,_ox:tx*T+T/2,_oy:ty*T+T/2});},
  update(){for(let i=this.list.length-1;i>=0;i--){const d=this.list[i];d.age++;if(d.age>=d.life)this.list.splice(i,1);}},
  draw(ctx){this.list.forEach(d=>{const t=d.age/d.life;const scale=1+t*1.5;const opacity=1-t;ctx.save();ctx.globalAlpha=opacity;ctx.translate(d._ox,d._oy);ctx.scale(scale,scale);ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔐',0,0);ctx.restore();});},
  clear(){this.list=[];}
};

// ============================================================
// GAME STATE
// ============================================================
const T=32,COLS=15,ROWS=11;
const S={
  hp:1000,maxHp:1000,atk:10,def:5,gold:0,keys:3,floor:1,
  x:1,y:1,map:[],monsters:[],items:[],
  debuffs:{poison:0,freeze:0},
  transitioning:false,

  init(){
    this.hp=1000;this.maxHp=1000;this.atk=10;this.def=5;
    this.gold=0;this.keys=3;this.floor=1;
    this.debuffs={poison:0,freeze:0};
    HPAnim.set(1000);HPAnim.displayed=1000;HPAnim.lerping=false;
  },

  genMap(){
    const m=[];
    for(let y=0;y<ROWS;y++){
      const r=[];
      for(let x=0;x<COLS;x++){r.push(y===0||y===ROWS-1||x===0||x===COLS-1?1:0);}
      m.push(r);
    }
    for(let i=0;i<12;i++){
      const wx=1+Math.floor(Math.random()*(COLS-2));
      const wy=1+Math.floor(Math.random()*(ROWS-2));
      if(wx!==this.x||wy!==this.y)m[wy][wx]=1;
    }
    for(let i=0;i<2+Math.floor(this.floor/3);i++){
      const kx=1+Math.floor(Math.random()*(COLS-2));
      const ky=1+Math.floor(Math.random()*(ROWS-2));
      if(!m[ky][kx]&&!(kx===this.x&&ky===this.y))m[ky][kx]=3;
    }
    for(let i=0;i<2;i++){
      const dx=1+Math.floor(Math.random()*(COLS-2));
      const dy=1+Math.floor(Math.random()*(ROWS-2));
      if(!m[dy][dx]&&!(dx===this.x&&dy===this.y))m[dy][dx]=5;
    }
    m[ROWS-2][COLS-2]=2;
    this.map=m;
  },

  spawnEnemies(){
    const count=2+Math.floor(this.floor*0.5);
    const enemies=[];
    const templates=[
      {emoji:'🕷️',name:'暗黑蜘蛛',hp:80+this.floor*15,atk:8+this.floor*2,def:2},
      {emoji:'🦇',name:'洞穴蝙蝠',hp:50+this.floor*10,atk:12+this.floor*2,def:0},
      {emoji:'💀',name:'骷髅战士',hp:100+this.floor*20,atk:15+this.floor*3,def:5}
    ];
    for(let i=0;i<count;i++){
      let ex,ey;
      do{ex=1+Math.floor(Math.random()*(COLS-2));ey=1+Math.floor(Math.random()*(ROWS-2));}
      while((ex===this.x&&ey===this.y)||(ex===COLS-2&&ey===ROWS-2)||this.map[ey][ex]!==0);
      const t=templates[Math.floor(Math.random()*templates.length)];
      const hasDebuff=Math.random()<0.3;
      const e={...t,maxHp:t.hp,debuff:hasDebuff?'poison':null,x:ex,y:ey};
      initMonsterHP(e);
      enemies.push(e);
    }
    this.monsters=enemies;
  },

  // ============================================================
  // PARTICLE SPAWNERS
  // ============================================================
  spawnDeathParticles(mx,my,emoji){
    const cx=(mx+0.5)*T,cy=(my+0.5)*T;
    const colors=['#ffd700','#ff8800','#ff4444','#ffffff','#ffcc00'];
    for(let i=0;i<6;i++){
      const angle=(Math.PI*2/6)*i+Math.random()*0.5;
      const speed=1.5+Math.random()*2;
      P.add({type:'circle',x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,color:colors[i%colors.length],life:40,r:3+Math.random()*3,scale:1,_sc:1,_r:0,_osc:0,_osc2:0,_dr:0,lx:0,ly:0.04});
    }
  },

  spawnKeySparkle(mx,my){
    const cx=(mx+0.5)*T,cy=(my+0.5)*T;
    for(let i=0;i<4;i++){
      const angle=Math.random()*Math.PI*2;
      const speed=0.8+Math.random()*1.2;
      P.add({type:'text',x:cx,y:cy,vx:Math.cos(angle)*speed,vy:-0.5-Math.random()*0.5,text:'✨',color:'#ffd700',life:35,fs:12,scale:1,_sc:1,_r:0,_osc:0,_osc2:0,_dr:0});
    }
  },

  spawnGoldSparkle(mx,my){
    const cx=(mx+0.5)*T,cy=(my+0.5)*T;
    for(let i=0;i<3;i++){
      const angle=Math.random()*Math.PI*2;
      const speed=0.5+Math.random()*1;
      P.add({type:'text',x:cx,y:cy,vx:Math.cos(angle)*speed,vy:-0.3-Math.random()*0.5,text:'💰',color:'#ffd700',life:30,fs:11,scale:1,_sc:1,_r:0,_osc:0,_osc2:0,_dr:0});
    }
  },

  spawnHPSparkle(mx,my){
    const cx=(mx+0.5)*T,cy=(my+0.5)*T;
    for(let i=0;i<3;i++){
      const angle=Math.random()*Math.PI*2;
      const speed=0.5+Math.random()*1;
      P.add({type:'text',x:cx,y:cy,vx:Math.cos(angle)*speed,vy:-0.3-Math.random()*0.5,text:'❤️',color:'#ff6688',life:30,fs:12,scale:1,_sc:1,_r:0,_osc:0,_osc2:0,_dr:0});
    }
  },

  spawnChestParticles(mx,my,reward){
    const cx=(mx+0.5)*T,cy=(my+0.5)*T;
    for(let i=0;i<8;i++){
      const angle=(Math.PI*2/8)*i;
      const speed=1.5+Math.random()*2;
      P.add({type:'circle',x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-1,color:'#ffd700',life:45,r:2+Math.random()*3,scale:1,_sc:1,_r:0,_osc:0,_osc2:0,_dr:0,lx:0,ly:0.05});
    }
    DmgNumbers.add(cx,cy-10,'+'+reward,'#ffd700');
  },

  spawnVictoryParticles(){
    const colors=['#ffd700','#ff8800','#ffffff','#ffcc00','#ff6600'];
    for(let i=0;i<50;i++){
      const x=Math.random()*480;
      const y=Math.random()*360;
      const angle=Math.random()*Math.PI*2;
      const speed=0.5+Math.random()*3;
      P.add({type:'circle',x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-1,color:colors[i%colors.length],life:80+Math.random()*40,r:2+Math.random()*4,scale:1,_sc:1,_r:0,_osc:0,_osc2:0,_dr:0,lx:0,ly:0.03});
    }
  },

  // ============================================================
  // DRAW
  // ============================================================
  draw(){
    const c=document.getElementById('c');
    const ctx=c.getContext('2d');

    HPAnim.update();
    FloorAnim.update();
    PlayerFlash.update();
    DoorAnim.update();

    const sh=Shake.update();
    ctx.save();
    if(sh)ctx.translate(sh.x,sh.y);

    // Map tiles
    for(let y=0;y<ROWS;y++){
      for(let x=0;x<COLS;x++){
        const t=this.map[y][x];
        const colors={0:'#1c2128',1:'#0d1117',2:'#d29922',3:'#58a6ff',4:'#f85149',5:'#bc8cff'};
        ctx.fillStyle=colors[t]||'#1c2128';
        ctx.fillRect(x*T,y*T,T,T);
        if(t===3){ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔑',x*T+T/2,y*T+T/2);}
        if(t===5){ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔐',x*T+T/2,y*T+T/2);}
        ctx.strokeStyle='#30363d';ctx.lineWidth=0.5;ctx.strokeRect(x*T,y*T,T,T);
      }
    }

    // Monsters
    this.monsters.filter(m=>m.hp>0).forEach(m=>{
      ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(m.emoji,(m.x+.5)*T,(m.y+.7)*T);

      m._dispHp+=(m.hp-m._dispHp)*0.2;
      const ratio=Math.max(0,m._dispHp/m.maxHp);
      const barW=T-4;
      ctx.fillStyle='#21262d';ctx.fillRect(m.x*T+2,m.y*T+2,barW,4);
      const hpColor=m._flash>0?'#ffffff':(ratio>0.5?'#3fb950':ratio>0.25?'#d29922':'#f85149');
      ctx.fillStyle=hpColor;ctx.fillRect(m.x*T+2,m.y*T+2,barW*ratio,4);
      if(m._flash>0)m._flash--;

      if(m.debuff){
        ctx.font='10px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('☠️',(m.x+.9)*T,(m.y+.25)*T);
      }
    });

    // Door animations
    DoorAnim.draw(ctx);

    // Player
    const px=(this.x+.5)*T,py=(this.y+.7)*T;
    const flashCol=PlayerFlash.getColor();

    // Freeze ice block
    if(this.debuffs.freeze>0){
      ctx.save();
      ctx.strokeStyle='#88ccff';ctx.lineWidth=2;
      ctx.shadowColor='#4488ff';ctx.shadowBlur=8;
      ctx.fillStyle='rgba(100,180,255,0.15)';
      ctx.fillRect(this.x*T+2,this.y*T+2,T-4,T-4);
      ctx.strokeRect(this.x*T+2,this.y*T+2,T-4,T-4);
      ctx.restore();
      if(Math.random()<0.18){
        P.add({type:'rect',x:this.x*T+Math.random()*T,y:this.y*T+Math.random()*T,color:'#aaddff',life:28,w:3,h:6,r:(Math.random()-0.5)*0.4,scale:1,_osc:0.3,_osc2:Math.random()*6,osc:true,_sc:1,_r:0,_dr:0.06,vy:-0.2});
      }
    }

    // Poison bubbling particles
    if(this.debuffs.poison>0){
      if(Math.random()<0.15){
        P.add({type:'circle',x:this.x*T+4+Math.random()*(T-8),y:this.y*T+T/2+Math.random()*8,color:'#44ff88',life:35,vy:-0.5,vx:(Math.random()-0.5)*0.4,r:2+Math.random()*2,scale:1,_sc:1,_r:0,_osc:0,_osc2:0,_dr:0,lx:0,ly:0});
        P.add({type:'circle',x:this.x*T+4+Math.random()*(T-8),y:this.y*T+T/2+Math.random()*8,color:'#88ff44',life:25,vy:-0.3,vx:(Math.random()-0.5)*0.3,r:1.5+Math.random()*1.5,scale:1,_sc:1,_r:0,_osc:0,_osc2:0,_dr:0,lx:0,ly:0});
      }
    }

    ctx.save();
    if(flashCol){ctx.fillStyle=flashCol;ctx.fillRect(this.x*T,this.y*T,T,T);}
    ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🧙',px,py);
    ctx.restore();

    // Debuff countdown on player
    if(this.debuffs.poison>0||this.debuffs.freeze>0){
      ctx.save();
      if(this.debuffs.poison>0){
        ctx.font='bold 10px sans-serif';
        ctx.fillStyle='#44ff44';
        ctx.fillText('☠'+this.debuffs.poison,this.x*T+T-6,this.y*T+10);
      }
      if(this.debuffs.freeze>0){
        ctx.font='bold 10px sans-serif';
        ctx.fillStyle='#88ccff';
        ctx.fillText('❄'+this.debuffs.freeze,this.x*T+T-6,this.y*T+22);
      }
      ctx.restore();
    }

    P.update();P.draw(ctx);
    DmgNumbers.update();DmgNumbers.draw(ctx);
    Overlay.update();Overlay.draw(ctx);

    ctx.restore();
    this.updateHPBar();
  },

  updateHPBar(){
    const fill=document.getElementById('hpBarFill');
    if(!fill)return;
    const pct=(HPAnim.getVal()/this.maxHp)*100;
    fill.style.width=pct+'%';
    fill.className='hp-bar-fill'+(pct<25?' low':pct<50?' mid':'');
  },

  // ============================================================
  // MOVE
  // ============================================================
  move(dx,dy){
    if(this.transitioning)return;
    if(this.debuffs.freeze>0){
      const rem=this.debuffs.freeze+1;
      this.debuffs.freeze--;
      this.showFreezeMsg(rem);
      this.log('❄️ 被冰冻了，本回合无法行动！');
      this.endTurn();
      return;
    }

    const nx=this.x+dx,ny=this.y+dy;
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS)return;
    if(this.map[ny][nx]===1)return;

    // Locked door
    if(this.map[ny][nx]===5){
      if(this.keys>0){
        this.keys--;
        DoorAnim.trigger(nx,ny);
        this.map[ny][nx]=0;
        this.log('🔓 用钥匙开门');
      }else{
        this.log('🔐 需要钥匙！');
        return;
      }
    }

    // Monster
    const m=this.monsters.find(m=>m.hp>0&&m.x===nx&&m.y===ny);
    if(m){this.fight(m);return;}

    // Item pickup
    if(this.map[ny][nx]===3){
      this.map[ny][nx]=0;
      const r=Math.random();
      if(r<.4){this.keys++;this.log('🔑 获得钥匙！');this.spawnKeySparkle(nx,ny);}
      else if(r<.7){const g=20;this.gold+=g;this.log('💰 金币 +'+g);this.spawnGoldSparkle(nx,ny);}
      else{const gain=200;const actual=Math.min(this.maxHp-this.hp,gain);this.hp+=actual;HPAnim.set(this.hp);this.log('❤️ +'+actual+'HP');this.spawnHPSparkle(nx,ny);}
    }

    this.x=nx;this.y=ny;
    if(this.map[ny][nx]===2)this.nextFloor();else this.endTurn();
    this.draw();this.ui();
  },

  fight(m){
    const dmg=Math.max(1,this.atk-m.def);
    m.hp-=dmg;
    DmgNumbers.add((m.x+.5)*T,(m.y+.3)*T,'-'+dmg,'#ffd700');
    hurtMonster(m,dmg);
    this.log('⚔️ 攻击'+m.name+'，伤害'+dmg);

    if(m.hp<=0){
      m.hp=0;m._dispHp=0;
      const goldGain=10+this.floor*2;
      this.gold+=goldGain;
      this.log('💰 击败'+m.name+'！金币 +'+goldGain);
      if(m.debuff==='poison'){this.debuffs.poison=3;this.log('☠️ 中了蜘蛛之毒！');}
      this.spawnDeathParticles(m.x,m.y,m.emoji);
      this.endTurn();
    } else {
      const md=Math.max(1,m.atk-this.def);
      this.hp-=md;
      HPAnim.set(this.hp);
      DmgNumbers.add((this.x+.5)*T,(this.y+.3)*T,'-'+md,'#f85149');
      this.log('💥 被反击，伤害'+md);
      if(this.hp<=0){this.gameOver();return;}
      this.endTurn();
    }
    this.draw();this.ui();
  },

  endTurn(){
    if(this.debuffs.poison>0){
      PlayerFlash.trigger('#ff6600',10);
      setTimeout(()=>{
        this.hp-=30;
        HPAnim.set(this.hp);
        DmgNumbers.add((this.x+.5)*T,(this.y+.3)*T,'-30','#44ff44');
        this.debuffs.poison--;
        this.log('☠️ 中毒伤害 30');
        if(this.hp<=0){this.gameOver();return;}
        this.monsterMove();
        this.draw();this.ui();
      },200);
      return;
    }
    this.monsterMove();
    this.draw();
  },

  monsterMove(){
    this.monsters.filter(m=>m.hp>0).forEach(m=>{
      const dx2=(m.x<this.x?1:m.x>this.x?-1:0);
      const dy2=(m.y<this.y?1:m.y>this.y?-1:0);
      // Prefer primary direction
      const mx0=m.x+dx2,my0=m.y+dy2;
      const canX=dx2!==0&&!(mx0===this.x&&my0===this.y)&&this.map[m.y][mx0]===0&&!this.monsters.some(m2=>m2.hp>0&&m2.x===mx0&&m2.y===m.y);
      const canY=dy2!==0&&!(mx0===this.x&&my0===this.y)&&this.map[my0]&&this.map[my0][m.x]===0&&!this.monsters.some(m2=>m2.hp>0&&m2.x===m.x&&m2.y===my0);
      if(canX)m.x=mx0;
      else if(canY)m.y=my0;
      else {
        // Try perpendicular
        const perpX=m.x+(dy2!==0?1:dx2!==0&&Math.random()<0.5?-1:1);
        const perpY=m.y+(dx2!==0?1:dy2!==0&&Math.random()<0.5?-1:1);
        if(this.map[m.y]&&this.map[m.y][perpX]===0&&!this.monsters.some(m2=>m2.hp>0&&m2.x===perpX&&m2.y===m.y))m.x=perpX;
        else if(this.map[perpY]&&this.map[perpY][m.x]===0&&!this.monsters.some(m2=>m2.hp>0&&m2.x===m.x&&m2.y===perpY))m.y=perpY;
      }
    });
  },

  nextFloor(){
    this.floor++;
    if(this.floor>20){this.win();return;}
    this.log('⬆️ 进入第'+this.floor+'层...');
    this.transitioning=true;
    DoorAnim.clear();P.clear();DmgNumbers.clear();
    // Fade out
    Overlay.show('black');
    setTimeout(()=>{
      this.x=1;this.y=1;
      this.debuffs={poison:0,freeze:0};
      HPAnim.displayed=this.hp;
      HPAnim.set(this.hp);
      this.genMap();this.spawnEnemies();
      FloorAnim.trigger();
      // Fade in
      setTimeout(()=>{
        Overlay.active=false;
        this.transitioning=false;
        this.draw();this.ui();
      },180);
      this.draw();
    },180);
  },

  showFreezeMsg(rem){
    const el=document.getElementById('freezeMsg');
    const txt=document.getElementById('freezeMsgText');
    if(!el||!txt)return;
    txt.textContent='冻结中 ('+rem+')';
    el.style.display='block';
    clearTimeout(this._freezeTimer);
    this._freezeTimer=setTimeout(()=>{el.style.display='none';},800);
  },

  ui(){
    FloorAnim.update();
    const fs=document.getElementById('floorNum');
    if(fs){
      fs.textContent='第'+this.floor+'层';
      if(FloorAnim.scale>1.01){
        fs.style.transform=`scale(${FloorAnim.scale.toFixed(2)})`;
        fs.style.display='inline-block';
      } else {
        fs.style.transform='scale(1)';
      }
    }
    document.getElementById('hpText').textContent=this.hp+'/'+this.maxHp;
    document.getElementById('atkText').textContent=this.atk;
    document.getElementById('defText').textContent=this.def;
    document.getElementById('goldText').textContent=this.gold;
    document.getElementById('keyText').textContent=this.keys;
    this.updateHPBar();
  },

  log(t){document.getElementById('log').textContent=t;},

  save(){
    localStorage.setItem('darktower',JSON.stringify({hp:this.hp,maxHp:this.maxHp,atk:this.atk,def:this.def,gold:this.gold,keys:this.keys,floor:this.floor,x:this.x,y:this.y,map:this.map,monsters:this.monsters,debuffs:this.debuffs}));
    this.log('💾 存档成功！');
  },

  load(){
    const d=localStorage.getItem('darktower');
    if(d){
      const s=JSON.parse(d);
      Object.assign(this,s);
      this.monsters.forEach(m=>initMonsterHP(m));
      HPAnim.set(this.hp);HPAnim.displayed=this.hp;
      this.draw();this.ui();
      this.log('📂 读档成功！');
    } else this.log('无存档');
  },

  reset(){
    this.init();HPAnim.displayed=1000;HPAnim.lerping=false;
    this.x=1;this.y=1;
    DoorAnim.clear();P.clear();DmgNumbers.clear();Overlay.active=false;
    this.genMap();this.spawnEnemies();this.draw();this.ui();
    this.log('已重置');
  },

  start(){
    document.getElementById('menu').style.display='none';
    this.reset();
    // Animation loop for continuous particle updates
    if(!this.animLoop){
      this.animLoop=requestAnimationFrame(function loop(){
        if(document.getElementById('menu').style.display==='none'){
          S.draw();
        }
        requestAnimationFrame(loop);
      });
    }
  },

  gameOver(){
    Shake.start(28,8);
    HPAnim.set(0);
    Overlay.show('defeat');
    setTimeout(()=>{
      Overlay.active=false;
      this.init();HPAnim.displayed=1000;HPAnim.lerping=false;
      this.x=1;this.y=1;DoorAnim.clear();P.clear();DmgNumbers.clear();
      this.genMap();this.spawnEnemies();this.draw();this.ui();
    },2800);
    this.log('💀 你倒在了第'+this.floor+'层');
  },

  win(){
    this.spawnVictoryParticles();
    Overlay.show('victory');
    setTimeout(()=>{document.getElementById('win').style.display='flex';},300);
    this.log('🏆 通关！');
  }
};

// Keyboard controls
document.addEventListener('keydown',e=>{
  if(document.getElementById('menu').style.display!=='none')return;
  const map={w:0,s:0,a:-1,d:1,ArrowUp:0,ArrowDown:0,ArrowLeft:-1,ArrowRight:1};
  if(map[e.key]!==undefined){
    const v=Math.abs(map[e.key]);
    if(v===1)S.move(map[e.key],0);
    else S.move(0,map[e.key]===0?-1:1);
    e.preventDefault();
  }
});

// D-pad controls
['Up','Down','Left','Right'].forEach(d=>{
  const b=document.getElementById('btn'+d);
  if(!b)return;
  let iv;
  const dir={Up:[0,-1],Down:[0,1],Left:[-1,0],Right:[1,0]};
  const start=()=>{S.move(...dir[d]);};
  b.addEventListener('touchstart',e=>{e.preventDefault();iv=setInterval(start,130);});
  b.addEventListener('touchend',()=>clearInterval(iv));
  b.addEventListener('mousedown',()=>{iv=setInterval(start,130);});
  b.addEventListener('mouseup',()=>clearInterval(iv));
  b.addEventListener('mouseleave',()=>clearInterval(iv));
});

// Win screen button
document.getElementById('win').addEventListener('click',()=>{
  document.getElementById('win').style.display='none';
  S.init();S.x=1;S.y=1;S.genMap();S.spawnEnemies();S.draw();S.ui();
});

S.ui();
</script>
